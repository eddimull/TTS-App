name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version name
        run: |
          set -euo pipefail
          # Prefer the latest git tag (set by release-please); fall back to
          # pubspec.yaml before the first tag exists. A missing tag is expected,
          # so don't let `git describe` failing abort the step.
          VERSION="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || true)"
          if [ -z "$VERSION" ]; then
            VERSION="$(sed -n 's/^version:[[:space:]]*\([^+]*\).*/\1/p' pubspec.yaml | head -n1 | tr -d '[:space:]')"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not resolve a version name from git tags or pubspec.yaml" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved version name: $VERSION (build number: $GITHUB_RUN_NUMBER)"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write Firebase config
        env:
          FIREBASE_OPTIONS_DART_BASE64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$FIREBASE_OPTIONS_DART_BASE64" ] || [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "::error::Firebase config secrets are not set (FIREBASE_OPTIONS_DART_BASE64 / GOOGLE_SERVICES_JSON_BASE64). The com.google.gms.google-services plugin requires google-services.json."
            exit 1
          fi
          echo -n "$FIREBASE_OPTIONS_DART_BASE64" | base64 --decode > lib/firebase_options.dart
          echo -n "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo -n "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Write key.properties
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Write local.properties
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY }}
        run: |
          cat > android/local.properties <<EOF
          sdk.dir=$ANDROID_SDK_ROOT
          GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
          EOF

      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --build-name=$VERSION \
            --build-number=$GITHUB_RUN_NUMBER \
            --dart-define=BASE_URL=${{ secrets.BASE_URL }} \
            --dart-define=PUSHER_APP_KEY=${{ secrets.PUSHER_APP_KEY }} \
            --dart-define=PUSHER_APP_CLUSTER=${{ secrets.PUSHER_APP_CLUSTER }} \
            --dart-define=GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=SENTRY_ENVIRONMENT=${{ secrets.SENTRY_ENVIRONMENT }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandmate-android-${{ github.sha }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Upload to Play Store (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: tts.band
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
