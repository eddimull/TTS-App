name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # yq (Go/mikefarah, v4) is preinstalled on both the ubuntu and macos
      # GitHub runner images, so the parse below behaves identically without
      # any setup step. (The mikefarah/yq action is a Docker container action
      # and cannot run on macOS runners.)
      - name: Resolve version name
        run: |
          set -euo pipefail
          # Use pubspec.yaml as the source of truth: release-please bumps it in
          # the release commit, so the build is always named the released
          # version. Reading the git tag here would race release-please creating
          # that tag and could label the build with the previous version.
          # pubspec version is `X.Y.Z+build`; drop the +build suffix. Keep the
          # read non-fatal (|| true) under `set -euo pipefail` so a missing or
          # broken yq doesn't abort the step before the git-tag fallback runs.
          VERSION="$(yq '.version' pubspec.yaml 2>/dev/null | sed 's/+.*//' || true)"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            # Fall back to the latest git tag if pubspec has no usable version.
            VERSION="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || true)"
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Could not resolve a version name from pubspec.yaml or git tags" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved version name: $VERSION (build number: $GITHUB_RUN_NUMBER)"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write Firebase config
        env:
          FIREBASE_OPTIONS_DART_BASE64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
        run: |
          if [ -z "$FIREBASE_OPTIONS_DART_BASE64" ]; then
            echo "::error::FIREBASE_OPTIONS_DART_BASE64 secret is not set; main.dart imports lib/firebase_options.dart."
            exit 1
          fi
          echo -n "$FIREBASE_OPTIONS_DART_BASE64" | base64 --decode > lib/firebase_options.dart

      - name: Import certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Fix google_places_native_sdk iOS podspec naming
        run: |
          PLUGIN_IOS="$HOME/.pub-cache/hosted/pub.dev/google_places_native_sdk-3.0.0/ios"
          if [ -f "$PLUGIN_IOS/flutter_location_sdk.podspec" ] && [ ! -f "$PLUGIN_IOS/google_places_native_sdk.podspec" ]; then
            cp "$PLUGIN_IOS/flutter_location_sdk.podspec" "$PLUGIN_IOS/google_places_native_sdk.podspec"
          fi

      - name: Switch to manual code signing
        run: |
          echo "CODE_SIGN_STYLE=Manual" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=Apple Distribution" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER=TTS Bandmate App Store" >> ios/Flutter/Release.xcconfig

      - name: Inject Google Maps API key
        env:
          GOOGLE_MAPS_IOS_API_KEY: ${{ secrets.GOOGLE_MAPS_IOS_API_KEY }}
        run: |
          if [ -z "$GOOGLE_MAPS_IOS_API_KEY" ]; then
            echo "::error::GOOGLE_MAPS_IOS_API_KEY secret is not set; cannot inject GMSApiKey for Google Maps."
            exit 1
          fi
          echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_IOS_API_KEY" >> ios/Flutter/Release.xcconfig

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --build-name="$VERSION" \
            --build-number="$GITHUB_RUN_NUMBER" \
            --dart-define=BASE_URL=${{ secrets.BASE_URL }} \
            --dart-define=PUSHER_APP_KEY=${{ secrets.PUSHER_APP_KEY }} \
            --dart-define=PUSHER_APP_CLUSTER=${{ secrets.PUSHER_APP_CLUSTER }} \
            --dart-define=GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=SENTRY_ENVIRONMENT=${{ secrets.SENTRY_ENVIRONMENT }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandmate-ios-${{ github.sha }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Generate apple-app-site-association
        run: |
          mkdir -p build/aasa
          cat > build/aasa/apple-app-site-association <<'EOF'
          {
            "webcredentials": {
              "apps": ["FBE5WVZKNK.band.tts.mate"]
            }
          }
          EOF

      - name: Upload AASA artifact
        uses: actions/upload-artifact@v4
        with:
          name: apple-app-site-association-${{ github.sha }}
          path: build/aasa/apple-app-site-association
          retention-days: 90

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
