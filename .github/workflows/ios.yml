name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Switch to manual code signing
        run: |
          python3 - <<'EOF'
          import re

          path = 'ios/Runner.xcodeproj/project.pbxproj'
          with open(path, 'r') as f:
              content = f.read()

          content = content.replace(
              'CODE_SIGN_STYLE = Automatic;',
              'CODE_SIGN_STYLE = Manual;'
          )
          content = content.replace(
              '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "iPhone Developer";',
              '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";'
          )
          content = re.sub(
              r'(CODE_SIGN_STYLE = Manual;)',
              r'\1\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "TTS Bandmate App Store";',
              content
          )

          with open(path, 'w') as f:
              f.write(content)

          print("Switched to manual signing")
          EOF

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --dart-define=BASE_URL=${{ secrets.BASE_URL }} \
            --dart-define=PUSHER_APP_KEY=${{ secrets.PUSHER_APP_KEY }} \
            --dart-define=PUSHER_APP_CLUSTER=${{ secrets.PUSHER_APP_CLUSTER }} \
            --dart-define=GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandmate-ios-${{ github.sha }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
