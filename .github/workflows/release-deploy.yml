name: Release Deploy

on:
  release:
    types: [published]
  # Invoked by release-please.yml when it cuts a release: release-please creates
  # the GitHub release with GITHUB_TOKEN, whose events do not trigger other
  # workflows, so `on: release` never fires for it. A reusable-workflow call
  # closes that gap and ships automatically on merge of the release PR.
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to deploy (e.g. v1.5.3)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release to deploy'
        required: true
        type: choice
        default: latest
        # "latest" resolves to the newest published release at run time, so it
        # never goes stale. The concrete tags below let you redeploy an older
        # release. release-please appends each new tag here on release (see
        # the "Sync deploy dropdown" step in release-please.yml).
        options:
          - latest
          # BEGIN release tags (managed by release-please) — do not edit by hand
          - v1.4.0
          - v1.3.0
          - v1.2.0
          # END release tags

permissions:
  contents: read

jobs:
  # Turn the dropdown choice (or the release-published event) into one
  # canonical, verified tag that every downstream job checks out. Resolving
  # once here keeps the three jobs from drifting and means "latest" / a
  # mis-cased entry can never reach an actual checkout.
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve tag and version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
          elif [ "$INPUT_TAG" = "latest" ] || [ -z "$INPUT_TAG" ]; then
            # The repo's "latest" release. The releases/latest API endpoint is
            # explicitly defined as the most recent non-draft, non-prerelease
            # release, so "latest" can't resolve to a draft or prerelease.
            tag="$(gh api repos/${{ github.repository }}/releases/latest --jq .tag_name)"
          else
            tag="$INPUT_TAG"
          fi

          # Normalize: trim, drop a leading "v" if present, then re-add it so
          # "V1.4.0", "1.4.0" and "v1.4.0" all map to the canonical "v1.4.0".
          tag="$(echo "$tag" | tr -d '[:space:]')"
          bare="$(echo "$tag" | sed 's/^[vV]//')"
          tag="v$bare"

          # Fail fast if the tag does not exist instead of letting checkout die
          # with a cryptic git error later.
          if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag '$tag' does not exist. Pick an existing release from the dropdown." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$bare" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$tag version=$bare"

  notes-test:
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - uses: actions/checkout@v4
        with:
          # Test the sanitizer against the exact tag the deploy jobs build.
          ref: ${{ needs.resolve.outputs.tag }}
      - name: Test release-notes sanitizer
        run: bash scripts/test_release_notes.sh

  release-ios:
    runs-on: macos-26
    needs: [resolve, notes-test]
    env:
      VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Generate release notes (What's New)
        run: |
          set -euo pipefail
          mkdir -p fastlane/metadata/en-US
          # Apple allows up to 4000 chars for "What's New in This Version".
          # deliver picks this file up automatically (skip_metadata: false) and,
          # because it is the only metadata file present, updates ONLY whatsNew.
          bash scripts/release_notes.sh CHANGELOG.md 4000 > fastlane/metadata/en-US/release_notes.txt
          echo "----- release_notes.txt -----"; cat fastlane/metadata/en-US/release_notes.txt
          # Export the absolute metadata dir so the Fastfile finds it regardless
          # of fastlane's working directory.
          echo "DELIVER_METADATA_PATH=$PWD/fastlane/metadata" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write Firebase config
        env:
          FIREBASE_OPTIONS_DART_BASE64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
        run: |
          if [ -z "$FIREBASE_OPTIONS_DART_BASE64" ]; then
            echo "::error::FIREBASE_OPTIONS_DART_BASE64 secret is not set."
            exit 1
          fi
          echo -n "$FIREBASE_OPTIONS_DART_BASE64" | base64 --decode > lib/firebase_options.dart

      - name: Import certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Fix google_places_native_sdk iOS podspec naming
        run: |
          PLUGIN_IOS="$HOME/.pub-cache/hosted/pub.dev/google_places_native_sdk-3.0.0/ios"
          if [ -f "$PLUGIN_IOS/flutter_location_sdk.podspec" ] && [ ! -f "$PLUGIN_IOS/google_places_native_sdk.podspec" ]; then
            cp "$PLUGIN_IOS/flutter_location_sdk.podspec" "$PLUGIN_IOS/google_places_native_sdk.podspec"
          fi

      - name: Switch to manual code signing
        run: |
          echo "CODE_SIGN_STYLE=Manual" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=Apple Distribution" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER=TTS Bandmate App Store" >> ios/Flutter/Release.xcconfig

      - name: Inject Google Maps API key
        env:
          GOOGLE_MAPS_IOS_API_KEY: ${{ secrets.GOOGLE_MAPS_IOS_API_KEY }}
        run: |
          if [ -z "$GOOGLE_MAPS_IOS_API_KEY" ]; then
            echo "::error::GOOGLE_MAPS_IOS_API_KEY secret is not set."
            exit 1
          fi
          echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_IOS_API_KEY" >> ios/Flutter/Release.xcconfig

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --build-name="$VERSION" \
            --build-number="$GITHUB_RUN_NUMBER" \
            --dart-define=BASE_URL=${{ secrets.BASE_URL }} \
            --dart-define=PUSHER_APP_KEY=${{ secrets.PUSHER_APP_KEY }} \
            --dart-define=PUSHER_APP_CLUSTER=${{ secrets.PUSHER_APP_CLUSTER }} \
            --dart-define=GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=SENTRY_ENVIRONMENT=${{ secrets.SENTRY_ENVIRONMENT }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Write ASC API key file
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "ASC_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Upload build to App Store Connect
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Install fastlane
        run: bundle install

      - name: Wait for build processing and submit for review
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        timeout-minutes: 45
        run: |
          set -euo pipefail
          bundle exec fastlane ios submit_review \
            version:"$VERSION" \
            build_number:"$GITHUB_RUN_NUMBER"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

  # Android ships by PROMOTING the build that the Android Build workflow
  # (android.yml) already uploaded to the internal track for this version —
  # we do NOT rebuild here. Promoting the same artifact (same versionCode) up
  # to production guarantees Play always sees a valid upgrade path. Rebuilding
  # in a separate workflow produced a *lower* versionCode than the internal
  # track (each workflow has its own GITHUB_RUN_NUMBER), which is what caused
  # "this release does not allow any existing users to upgrade".
  release-android:
    runs-on: ubuntu-latest
    needs: [resolve, notes-test]
    permissions:
      contents: read
      id-token: write
    env:
      VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Generate release notes
        run: |
          set -euo pipefail
          # Google Play caps "What's new" at 500 chars per language (Apple
          # allows 4000); pass the smaller cap so a multi-feature release
          # doesn't get rejected by the Play API.
          bash scripts/release_notes.sh CHANGELOG.md 500 > /tmp/whatsnew-en-US.txt
          echo "----- whatsnew-en-US -----"; cat /tmp/whatsnew-en-US.txt

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          # androidpublisher scope is required to read/promote Play tracks.
          # NOTE: the input is access_token_scopes (NOT scopes) — auth@v2
          # silently ignores an unknown 'scopes' input and falls back to the
          # default cloud-platform scope, which 403s against the Play API.
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Promote internal build to production
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          PACKAGE: tts.band
        run: |
          set -euo pipefail
          base="https://androidpublisher.googleapis.com/androidpublisher/v3/applications/${PACKAGE}"

          # 1+2. Find the versionCode to promote: the COMPLETED internal-track
          #      release whose versionName matches this release ($VERSION). The
          #      Android Build workflow uploads that build to the internal track
          #      on the release commit, which can lag the release-published
          #      event that starts this job — so poll until it appears (up to 20
          #      min). Use a FRESH edit each iteration: an edit is a
          #      point-in-time snapshot and the internal upload commits its own
          #      edit, which would otherwise leave a long-lived one stale. We do
          #      NOT fall back to a different version's build — promoting a
          #      mismatched code would ship the wrong binary.
          deadline=$(( $(date +%s) + 1200 ))
          edit_id=""
          code=""
          while :; do
            edit_json="$(curl -fsS -X POST "$base/edits" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Length: 0")" || {
                echo "::error::Failed to create a Play edit. Check that the service account has Android Publisher access and that the access token carries the androidpublisher scope (access_token_scopes)."
                exit 1
              }
            edit_id="$(printf '%s' "$edit_json" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')"

            internal_json="$(curl -fsS "$base/edits/$edit_id/tracks/internal" \
              -H "Authorization: Bearer $ACCESS_TOKEN" 2>/dev/null || echo '{}')"
            code="$(printf '%s' "$internal_json" | VERSION="$VERSION" python3 -c '
          import json,os,sys
          try: data=json.load(sys.stdin)
          except Exception: data={}
          version=os.environ["VERSION"]
          done=[r for r in data.get("releases",[]) if r.get("status")=="completed" and str(r.get("name","")).lstrip("vV")==version]
          codes=sorted({int(c) for r in done for c in r.get("versionCodes",[])})
          print(codes[-1] if codes else "")
          ')"
            if [ -n "$code" ]; then
              echo "Found internal build (versionCode $code) for $VERSION; promoting via edit $edit_id."
              break
            fi

            # Not ready yet: abandon this snapshot and wait, unless out of time.
            curl -fsS -X DELETE "$base/edits/$edit_id" \
              -H "Authorization: Bearer $ACCESS_TOKEN" -o /dev/null 2>/dev/null || true
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::No completed internal release named '$VERSION' after waiting 20 min. Ensure the Android Build workflow uploaded this version to the internal track."
              exit 1
            fi
            echo "Internal build for $VERSION not on the internal track yet; waiting 30s..."
            sleep 30
          done

          # 2b. Idempotency: if production already carries this versionCode (e.g.
          #     the deploy is being re-run, or only the iOS job failed last
          #     time), there is nothing to promote. Skip rather than re-commit
          #     the same release, which Play rejects. GET 404s when no
          #     production release exists yet, so default to "{}" (first release).
          prod_json="$(curl -fsS "$base/edits/$edit_id/tracks/production" \
            -H "Authorization: Bearer $ACCESS_TOKEN" 2>/dev/null || echo '{}')"
          already="$(printf '%s' "$prod_json" | CODE="$code" python3 -c '
          import json,os,sys
          try: data=json.load(sys.stdin)
          except Exception: data={}
          code=int(os.environ["CODE"])
          present=any(int(c)==code for r in data.get("releases",[]) for c in r.get("versionCodes",[]))
          print("yes" if present else "no")
          ')"
          if [ "$already" = "yes" ]; then
            echo "versionCode $code is already on the production track — nothing to promote (idempotent re-run)."
            curl -fsS -X DELETE "$base/edits/$edit_id" \
              -H "Authorization: Bearer $ACCESS_TOKEN" -o /dev/null 2>/dev/null || true
            exit 0
          fi

          # 3. Build the production track payload (release notes JSON-escaped by python).
          payload="$(VERSION="$VERSION" CODE="$code" NOTES_FILE=/tmp/whatsnew-en-US.txt python3 -c '
          import json,os
          notes=open(os.environ["NOTES_FILE"],encoding="utf-8").read().strip()
          body={"track":"production","releases":[{
            "name":os.environ["VERSION"],
            "versionCodes":[os.environ["CODE"]],
            "status":"completed",
            "releaseNotes":[{"language":"en-US","text":notes}],
          }]}
          print(json.dumps(body))
          ')"

          # 4. Set the production track to that release, then commit the edit
          #    (commit auto-submits the changes for review).
          curl -fsS -X PUT "$base/edits/$edit_id/tracks/production" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload" | python3 -m json.tool

          curl -fsS -X POST "$base/edits/$edit_id:commit" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Length: 0" | python3 -m json.tool
          echo "Promoted versionCode $code ($VERSION) to production."
