name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write
  # Required by the deploy job below: release-deploy's Android job mints a
  # Google WIF token (id-token), and a reusable workflow can only use it if the
  # caller grants it.
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Ship the release as soon as release-please cuts it. release-please creates
  # the GitHub release with GITHUB_TOKEN, whose events do not trigger other
  # workflows, so release-deploy's `on: release` never fires for it. Calling it
  # directly as a reusable workflow makes merging the release PR ship to
  # production hands-free.
  deploy:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/release-deploy.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

  # When release-please cuts a new release, refresh the static tag list in the
  # Release Deploy dropdown so the newest tags are always selectable. The
  # dropdown's "latest" option works without this; this just keeps the
  # redeploy-an-older-version choices current.
  sync-deploy-dropdown:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update dropdown tag list
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          WF=.github/workflows/release-deploy.yml
          # 6 most recent tags, newest first, formatted as dropdown options.
          tags="$(git tag --sort=-creatordate | head -n 6)"
          {
            echo "          # BEGIN release tags (managed by release-please) — do not edit by hand"
            while IFS= read -r t; do
              [ -n "$t" ] && echo "          - $t"
            done <<< "$tags"
            echo "          # END release tags"
          } > /tmp/tagblock.txt

          # Replace everything between the BEGIN/END markers with the fresh block.
          awk '
            /# BEGIN release tags \(managed by release-please\)/ { skip=1; while ((getline line < "/tmp/tagblock.txt") > 0) print line; next }
            /# END release tags/ { skip=0; next }
            skip != 1 { print }
          ' "$WF" > "$WF.new"
          mv "$WF.new" "$WF"

          if git diff --quiet "$WF"; then
            echo "Dropdown already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$WF"
          git commit -m "chore(deploy): refresh Release Deploy tag dropdown"
          git push
