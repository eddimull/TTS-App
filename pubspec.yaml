name: tts_bandmate
description: TTS Bandmate — band booking and live setlist management
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  go_router: ^17.2.0
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  dio: ^5.4.3
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.3
  table_calendar: ^3.2.0
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  timeago: ^3.6.1
  connectivity_plus: ^7.1.0
  pusher_channels_flutter: ^2.6.0
  timelines_plus: ^2.0.0
  url_launcher: ^6.3.0
  flutter_google_places_sdk: ^0.4.3
  google_maps_flutter: ^2.17.0
  image_picker: ^1.1.2
  file_picker: ^10.3.10
  path_provider: ^2.1.4
  open_file: ^3.5.10
  video_player: ^2.9.2
  just_audio: ^0.10.4
  sentry_flutter: ^9.17.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  share_plus: ^10.0.0
  map_launcher: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.3
  json_serializable: ^6.7.1
  freezed: ^3.1.0
  freezed_annotation: ^3.1.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/gigIcons/
