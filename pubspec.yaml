name: tts_bandmate
description: TTS Bandmate — band booking and live setlist management
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  table_calendar: ^3.1.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  timeago: ^3.6.1
  connectivity_plus: ^6.0.3
  pusher_channels_flutter: ^2.1.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/gigIcons/
